name: Monitoring CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
      - 'feature/**'

  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Validate YAML files
        run: |
          yamllint .

      - name: Create dummy .env for config validation
        run: |
          echo "GRAFANA_USER=dummy" > .env
          echo "GRAFANA_PASSWORD=dummy" >> .env

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Validate Prometheus config
        run: |
          docker run --rm \
          --entrypoint promtool \
          -v ${{ github.workspace }}/prometheus.yml:/prometheus.yml \
          prom/prometheus:v2.53.5 \
          check config /prometheus.yml

  test-stack:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "GRAFANA_USER=${{ secrets.GRAFANA_USER }}" >> .env
          echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env

      - name: Start monitoring stack
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Grafana..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Grafana is up"
              exit 0
            fi
            echo "Attempt $i/12, retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Grafana did not start in time"
          exit 1

      - name: Check Prometheus is reachable from Grafana container
        run: |
          docker exec grafana wget -qO- http://prometheus:9090/-/healthy

      - name: Check Node Exporter metrics are scraped
        run: |
          docker exec grafana wget -qO- \
            "http://prometheus:9090/api/v1/query?query=up" \
            | grep -q '"value"'

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v
