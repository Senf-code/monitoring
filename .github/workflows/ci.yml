name: Monitoring CI

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get Install -y yamllint

      - name: Validate YAML files
        run: |
          yamllint .
